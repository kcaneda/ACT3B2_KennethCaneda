<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clientes</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2e0f3d, #5e1f7a, #9b3dbb);
            color: #333;
            padding: 20px;
        }

        .titulo {
            text-align: center;
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .subtitulo {
            text-align: center;
            color: #ead7f5;
            margin-bottom: 30px;
        }

        .toolbar {
            text-align: right;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .boton-nuevo {
            background: linear-gradient(135deg, #8e24aa, #d81b60);
        }

        .boton-editar {
            background: linear-gradient(135deg, #6a1b9a, #ab47bc);
        }

        .boton-eliminar {
            background: linear-gradient(135deg, #4a148c, #7b1fa2);
        }

        .boton-cancelar {
            background: linear-gradient(135deg, #5e35b1, #9575cd);
        }

        .boton-crear {
            background: linear-gradient(135deg, #8e24aa, #ba68c8);
        }

        .btn:hover {
            opacity: 0.85;
            transform: scale(1.05);
        }

        .tarjeta-tabla {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #4a148c, #8e24aa);
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background-color: #f5f1f8;
        }

        tbody tr:hover {
            background-color: #e6d0f0;
        }

        .form-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .campo {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

         .confirm-msg {
            margin: 15px 0;
            text-align: center;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #6a1b9a;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(30,0,50,0.6);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .overlay:target {
            display: flex;
        }

        .overlay > div {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            max-width: 90%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mensaje-error {
            background: #f3e5f5;
            color: #6a1b9a;
            border: 1px solid #e1bee7;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            text-align: center;
        }

        .modal-acciones {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

         .modal {
            width: 100%;
        }

        .confirm-msg {
            margin: 15px 0;
            text-align: center;
        }
    </style>
</head>
<body>
<div class="toolbar">
    <a href="/home" class="btn">Volver a Inicio</a>
    <a href="#modalCrear" class="btn boton-nuevo">Agregar Cliente</a>
</div>

<div class="tarjeta-tabla">
    <table>
        <thead>
        <tr>
            <th>DPI</th>
            <th>Nombre</th>
            <th>Apellido</th>
            <th>Direccion</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="clientes : ${cliente}">
            <td th:text="*{clientes.dpiCliente}"></td>
            <td th:text="*{clientes.nombreCliente}"></td>
            <td th:text="*{clientes.apellidoCliente}"></td>
            <td th:text="*{clientes.direccion}"></td>
            <td th:text="*{clientes.estado} ? 'Activo' : 'Inactivo'"></td>
            <td>
                <a th:href="@{/clientes/editar/{id}(id=${clientes.dpiCliente})}" class="btn boton-editar">Editar</a>
                <a th:href="@{/clientes/eliminar/{id}(id=${clientes.dpiCliente})}" class="btn boton-eliminar">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div id="modalCrear" class="overlay" th:style="${mostrarModalCrear} ? 'display:flex;' : ''">
    <div class="modal">
        <h2>Crear Cliente</h2>
        <form th:action="@{/clientes/crear}" th:object="${nuevoCliente}" method="post">
            <div>
                <div class="campo">
                    <label>DPI</label>
                    <input type="number" th:field="*{dpiCliente}" placeholder="Ingrese el DPI del cliente" required>
                    <div class="mensaje-error" th:if="${#fields.hasErrors('dpiCliente')}"
                    th:errors="*{dpiCliente}"></div>
                </div>
                <div class="campo">
                    <label>Nombre</label>
                    <input type="text" th:field="*{nombreCliente}" placeholder="Ingrese el nombre del cliente" required>
                    <div class="mensaje-error" th:if="${#fields.hasErrors('nombreCliente')}"
                    th:errors="*{nombreCliente}"></div>
                </div>
                <div class="campo">
                    <label>Apellido</label>
                    <input type="text" th:field="*{apellidoCliente}" placeholder="Ingrese el apellido del cliente" required>
                    <div class="mensaje-error" th:if="${#fields.hasErrors('apellidoCliente')}"
                    th:errors="*{apellidoCliente}"></div>
                </div>
                <div class="campo">
                    <label>Dirección</label>
                    <input type="text" th:field="*{direccion}" placeholder="Ingrese la direccion del cliente" required>
                    <div class="mensaje-error" th:if="${#fields.hasErrors('direccion')}"
                    th:errors="*{direccion}"></div>
                </div>
                <div class="campo">
                    <label>Estado</label>
                    <select th:field="*{estado}" required>
                        <option value="true">Activo</option>
                        <option value="false">Inactivo</option>
                    </select>
                </div>
            </div>
            <div class="modal-acciones">
                <a href="/clientes" class="btn boton-cancelar">Cancelar</a>
                <button type="submit" class="btn boton-crear">Guardar</button>
            </div>
        </form>
    </div>
</div>
<div th:if="${clienteAEditar != null or mostrarModalEditar != null}" id="modalEditar" class="overlay" style="display:flex;">
    <div class="modal">
        <h2>Editar Cliente</h2>
        <form th:action="@{/clientes/editar/{id}(id=${clienteAEditar.dpiCliente})}" th:object="${clienteAEditar}" method="post">
            <div>
                <div class="campo">
                    <label>DPI</label>
                    <input type="number" th:field="*{dpiCliente}" placeholder="Ingrese el DPI del cliente" readonly>
                    <div class="mensaje-error" th:if="${#fields.hasErrors('dpiCliente')}"
                         th:errors="*{dpiCliente}"></div>
                </div>
                <div class="campo">
                    <label>Nombre</label>
                    <input type="text" th:field="*{nombreCliente}" placeholder="Ingrese el nombre del cliente" required>
                    <div class="mensaje-error" th:if="${#fields.hasErrors('nombreCliente')}"
                         th:errors="*{nombreCliente}"></div>
                </div>
                <div class="campo">
                    <label>Apellido</label>
                    <input type="text" th:field="*{apellidoCliente}" placeholder="Ingrese el apellido del cliente" required>
                    <div class="mensaje-error" th:if="${#fields.hasErrors('apellidoCliente')}"
                         th:errors="*{apellidoCliente}"></div>
                </div>
                <div class="campo">
                    <label>Dirección</label>
                    <input type="text" th:field="*{direccion}" placeholder="Ingrese la direccion del cliente" required>
                    <div class="mensaje-error" th:if="${#fields.hasErrors('direccion')}"
                         th:errors="*{direccion}"></div>
                </div>
                <div class="campo">
                    <label>Estado</label>
                    <select th:field="*{estado}" required>
                        <option value="true">Activo</option>
                        <option value="false">Inactivo</option>
                    </select>
                </div>
            </div>
            <div class="modal-acciones">
                <a href="/clientes" class="btn boton-cancelar">Cancelar</a>
                <button type="submit" class="btn boton-crear">Guardar</button>
            </div>
        </form>
    </div>
</div>

<div th:if="${clienteAEliminar != null}" id="modalEliminar" class="overlay" style="display:flex;">
    <div class="modal">
        <p class="confirm-msg">¿Desea borrar al cliente
            <strong th:text="${clienteAEliminar.nombreCliente}"></strong>?
            Esta acción no puede deshacerse.</p>
        <form th:action="@{/clientes/eliminar/{id}(id=${clienteAEliminar.dpiCliente})}" th:object="${clienteAEliminar}" method="post">
            <a href="/clientes" class="btn boton-cancelar">Cancelar</a>
            <button type="submit" class="btn boton-eliminar">Confirmar</button>
        </form>
    </div>
</div>

</body>
</html>
