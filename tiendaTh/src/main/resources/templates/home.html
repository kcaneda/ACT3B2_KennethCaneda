    <!DOCTYPE html>
    <html lang="es" xmlns:th="http://www.thymeleaf.org">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Página de Inicio</title>
            <style>
                * {
                    margin: 0;
                    padding: 0;
                    box-sizing: border-box;
                }

                body {
                    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                    min-height: 100vh;
                    display: flex;
                    justify-content: center;
                    align-items: center;
                    background: linear-gradient(135deg, #2e1065, #6b21a8, #c084fc);
                    padding: 20px;
                }

                .contenedor {
                    width: 100%;
                    max-width: 420px;
                }

                .tarjeta {
                    background: rgba(255, 255, 255, 0.95);
                    backdrop-filter: blur(8px);
                    border-radius: 24px;
                    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
                    padding: 35px 30px;
                    text-align: center;
                    animation: aparecer 0.6s ease;
                }

                @keyframes aparecer {
                    from {
                        opacity: 0;
                        transform: translateY(20px);
                    }
                    to {
                        opacity: 1;
                        transform: translateY(0);
                    }
                }

                .titulo {
                    font-size: 30px;
                    color: #1e1b4b;
                    margin-bottom: 10px;
                }

                .subtitulo {
                    font-size: 15px;
                    color: #6b7280;
                    margin-bottom: 25px;
                }

                .mensaje {
                    margin-bottom: 18px;
                    padding: 12px 14px;
                    border-radius: 12px;
                    font-size: 14px;
                    font-weight: 500;
                    text-align: center;
                }

                .error {
                    background: #fee2f8;
                    color: #9d174d;
                    border: 1px solid #fbcfe8;
                }

                .success {
                    background: #ede9fe;
                    color: #6d28d9;
                    border: 1px solid #ddd6fe;
                }

                .campo {
                    margin-bottom: 18px;
                    text-align: left;
                }

                .campo label {
                    display: block;
                    font-size: 13px;
                    color: #6b7280;
                    margin-bottom: 6px;
                    text-transform: uppercase;
                    letter-spacing: 0.5px;
                    font-weight: 600;
                }

                .campo input {
                    width: 100%;
                    padding: 14px 16px;
                    border: 1px solid #e9d5ff;
                    border-radius: 14px;
                    font-size: 15px;
                    outline: none;
                    background: #faf5ff;
                    transition: all 0.3s ease;
                }

                .campo input:focus {
                    border-color: #7c3aed;
                    background: #ffffff;
                    box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15);
                }

                  .acciones {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 25px;
        }

                    .boton {
                display: block;
                width: 100%;
                padding: 14px 20px;
                border-radius: 14px;
                text-decoration: none;
                color: white;
                font-size: 16px;
                font-weight: bold;
                transition: all 0.3s ease;
                background: #A627F5;
                box-shadow: 0 10px 20px rgba(22, 163, 74, 0.25);
            }

            .boton:hover {
                transform: translateY(-2px);
                box-shadow: 0 14px 24px rgba(37, 99, 235, 0.35);
            }

            .logout {
                background: linear-gradient(135deg, #dc2626, #ef4444);
                box-shadow: 0 10px 20px rgba(220, 38, 38, 0.25);
            }

            .logout:hover {
                box-shadow: 0 14px 24px rgba(220, 38, 38, 0.35);
            }

            .logout-btn {
                width: 100%;
                padding: 14px 20px;
                border: none;
                border-radius: 14px;
                color: white;
                font-size: 16px;
                font-weight: bold;
                cursor: pointer;
                background: linear-gradient(135deg, #dc2626, #ef4444);
                transition: all 0.3s ease;
            }

            .logout-btn:hover {
                transform: translateY(-2px);
            }

            .logout-btn:active {
                transform: scale(0.98);
            }

            a{
                color: #16a34a;
            }

            @media (max-width: 480px) {
                .tarjeta {
                    padding: 28px 22px;
                }

                .titulo {
                    font-size: 25px;
                }
            }
            </style>
    </head>
    <body>
    <div class="contenedor">
        <div class="tarjeta">
            <h1 class="titutlo">¡Bienvenido!</h1>
            <p class="subtitulo">
                Hola, <span class="usuario" th:text="${nombreUsuario}"></span> <br> Has iniciado sesión correctamente.
            </p>
            <div class="acciones">
                <a th:href="@{/clientes}" class="boton" >Ir a Clientes</a>
                <a th:href="@{/detalles}" class="boton">Ir a los detalles de Ventas</a>
                <a th:href="@{/ventas}" class="boton">Ir a Ventas</a>
                <a th:href="@{/productos}" class="boton">Ir a productos</a>
                <a th:href="@{/usuarios}" class="boton">Ir a usuarios</a>

                <form th:action="@{/logout}" method="post">
                    <button type="submit" class="logout-btn">Cerrar Sesion</button>
                </form>
            </div>
        </div>
    </div>

    </body>
    </html>
