<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lista de Productos</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #2e0f3d, #5e1f7a, #9b3dbb);
            color: #333;
            padding: 20px;
        }

        .titulo {
            text-align: center;
            font-size: 2.5rem;
            color: #ffffff;
            margin-bottom: 10px;
        }

        .subtitulo {
            text-align: center;
            color: #ead7f5;
            margin-bottom: 30px;
        }

        .toolbar {
            text-align: right;
            margin-bottom: 15px;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            text-decoration: none;
            color: white;
            font-weight: bold;
            transition: 0.3s;
            border: none;
            cursor: pointer;
        }

        .boton-nuevo {
            background: linear-gradient(135deg, #8e24aa, #d81b60);
        }

        .boton-editar {
            background: linear-gradient(135deg, #6a1b9a, #ab47bc);
        }

        .boton-eliminar {
            background: linear-gradient(135deg, #4a148c, #7b1fa2);
        }

        .boton-cancelar {
            background: linear-gradient(135deg, #5e35b1, #9575cd);
        }

        .boton-crear {
            background: linear-gradient(135deg, #8e24aa, #ba68c8);
        }

        .btn:hover {
            opacity: 0.85;
            transform: scale(1.05);
        }

        .tarjeta-tabla {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        thead {
            background: linear-gradient(135deg, #4a148c, #8e24aa);
            color: white;
        }

        th, td {
            padding: 12px;
            text-align: center;
        }

        tbody tr:nth-child(even) {
            background-color: #f5f1f8;
        }

        tbody tr:hover {
            background-color: #e6d0f0;
        }

        .form-group {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
        }

        .campo {
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        label {
            margin-bottom: 5px;
            font-weight: bold;
        }

        input, select {
            padding: 10px;
            border-radius: 6px;
            border: 1px solid #ccc;
            outline: none;
        }

        input:focus, select:focus {
            border-color: #6a1b9a;
        }

        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(30,0,50,0.6);
            display: none;
            align-items: center;
            justify-content: center;
        }

        .overlay:target {
            display: flex;
        }

        .overlay > div {
            background: white;
            padding: 25px;
            border-radius: 12px;
            width: 400px;
            max-width: 90%;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-15px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .mensaje-error {
            background: #f3e5f5;
            color: #6a1b9a;
            border: 1px solid #e1bee7;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            text-align: center;
        }

        .modal-acciones {
            display: flex;
            justify-content: space-between;
            margin-top: 20px;
        }

         .modal {
            width: 100%;
        }

        .confirm-msg {
            margin: 15px 0;
            text-align: center;
        }
    </style>
</head>
<body>

<h1 class="titulo">Tabla de Productos</h1>

<div class="toolbar">
    <a href="#modalCrear" class="btn boton-nuevo">+ Nuevo Producto</a>
    <a href="/home" class="btn">Volver a Inicio</a>
</div>

<div class="tarjeta-tabla">
    <table>
        <thead>
        <tr>
            <th>Código</th>
            <th>Nombre</th>
            <th>Precio</th>
            <th>Stock</th>
            <th>Estado</th>
            <th>Acciones</th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="producto : ${productos}">
            <td th:text="${producto.codigoProducto}"></td>
            <td th:text="${producto.nombreProducto}"></td>
            <td th:text="${producto.precio}"></td>
            <td th:text="${producto.stock}"></td>
            <td th:text="${producto.estado} ? 'Disponible' : 'No Disponible'"></td>
            <td>
                <a th:href="@{/productos/editar/{id}(id=${producto.codigoProducto})}" class="btn boton-editar">Editar</a>
                <a th:href="@{/productos/eliminar/{id}(id=${producto.codigoProducto})}" class="btn boton-eliminar">Eliminar</a>
            </td>
        </tr>
        </tbody>
    </table>
</div>

<div id="modalCrear" class="overlay" th:style="${mostrarModalCrear} ? 'display:flex;' : ''">
    <div class="modal">
        <h2>Nuevo Producto</h2>
        <form th:action="@{/productos/crear}" th:object="${nuevoProducto}" method="post">
            <div class="campo">
                <label>Nombre</label>
                <input type="text" th:field="*{nombreProducto}" placeholder="Nombre del producto" required>
                <div class="mensaje-error" th:if="${#fields.hasErrors('nombreProducto')}"
                     th:errors="*{nombreProducto}"></div>
            </div>
            <div class="campo">
                <label>Precio</label>
                <input type="number" th:field="*{precio}" placeholder="0.00" step="0.01" min="0" required>
                <div class="mensaje-error" th:if="${#fields.hasErrors('precio')}"
                     th:errors="*{precio}"></div>
            </div>
            <div class="campo">
                <label>Stock</label>
                <input type="number" th:field="*{stock}" placeholder="0" min="0" required>
                <div class="mensaje-error" th:if="${#fields.hasErrors('stock')}"
                     th:errors="*{stock}"></div>
            </div>
            <div class="campo">
                <label>Estado</label>
                <select th:field="*{estado}">
                    <option value="true">Disponible</option>
                    <option value="false">No Disponible</option>
                </select>
            </div>
            <div class="modal-acciones">
                <a href="/productos" class="btn boton-cancelar">Cancelar</a>
                <button type="submit" class="btn boton-crear">Guardar</button>
            </div>
        </form>
    </div>
</div>

<div th:if="${productoAEditar != null or mostrarModalEditar != null}" id="modalEditar" class="overlay" style="display:flex;">
    <div class="modal">
        <h2>Editar Producto</h2>
        <form th:action="@{/productos/editar/{id}(id=${productoAEditar.codigoProducto})}"
              th:object="${productoAEditar}"
              method="post">
            <div>
                <div class="campo">
                    <label>Nombre</label>
                    <input type="text" th:field="*{nombreProducto}" placeholder="Ingrese el nombre del producto" required>
                    <div class="mensaje-error" th:if="${#fields.hasErrors('nombreProducto')}"
                    th:errors="*{nombreProducto}"></div>
                </div>
                <div class="campo">
                    <label>Precio</label>
                    <input type="number" th:field="*{precio}" step="0.01" min="0" placeholder="Ingrese  el precio del producto" required>
                    <div class="mensaje-error" th:if="${#fields.hasErrors('precio')}"
                         th:errors="*{precio}"></div>
                </div>
                <div class="campo">
                    <label>Stock</label>
                    <input type="number" th:field="*{stock}" min="0" placeholder="Ingresar el stock del producto" required>
                    <div class="mensaje-error" th:if="${#fields.hasErrors('stock')}"
                         th:errors="*{stock}"></div>
                </div>
                <div class="campo">
                    <label>Estado</label>
                    <select th:field="*{estado}">
                        <option value="true">Disponible</option>
                        <option value="false">No Disponible</option>
                    </select>
                </div>
            </div>
            <div class="modal-acciones">
                <a href="/productos" class="btn boton-cancelar">Cancelar</a>
                <button type="submit" class="btn boton-editar">Guardar</button>
            </div>
        </form>
    </div>
</div>

<div th:if="${productoAEliminar != null}" id="modalEliminar" class="overlay" style="display:flex;">
    <div class="modal">
        <h2>Eliminar Producto</h2>
        <p class="confirm-msg">
            ¿Eliminar el producto
            <strong th:text="${productoAEliminar.nombreProducto}"></strong>?
            Esta acción no se puede deshacer.
        </p>
        <form th:action="@{/productos/eliminar/{id}(id=${productoAEliminar.codigoProducto})}"
              method="post">
            <div class="modal-actions">
                <a href="/productos" class="btn boton-cancelar">Cancelar</a>
                <button type="submit" class="btn boton-eliminar">Eliminar</button>
            </div>
        </form>
    </div>
</div>

</body>
</html>
