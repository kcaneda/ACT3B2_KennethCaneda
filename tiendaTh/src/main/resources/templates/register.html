<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Registrarse</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background: linear-gradient(135deg, #2e1065, #6b21a8, #c084fc);
            padding: 20px;
        }

        .contenedor {
            width: 100%;
            max-width: 420px;
        }

        .tarjeta {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(8px);
            border-radius: 24px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.25);
            padding: 35px 30px;
            text-align: center;
            animation: aparecer 0.6s ease;
        }

        @keyframes aparecer {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .titulo {
            font-size: 30px;
            color: #1e1b4b;
            margin-bottom: 10px;
        }

        .subtitulo {
            font-size: 15px;
            color: #6b7280;
            margin-bottom: 25px;
        }

        .mensaje {
            margin-bottom: 18px;
            padding: 12px 14px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            text-align: center;
        }

        .error {
            background: #fee2f8;
            color: #9d174d;
            border: 1px solid #fbcfe8;
        }

        .success {
            background: #ede9fe;
            color: #6d28d9;
            border: 1px solid #ddd6fe;
        }

        .campo {
            margin-bottom: 18px;
            text-align: left;
        }

        .campo label {
            display: block;
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 6px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            font-weight: 600;
        }

        .campo input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #e9d5ff;
            border-radius: 14px;
            font-size: 15px;
            outline: none;
            background: #faf5ff;
            transition: all 0.3s ease;
        }

        .campo input:focus {
            border-color: #7c3aed;
            background: #ffffff;
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.15);
        }

        .boton {
            width: 100%;
            padding: 14px 20px;
            border: none;
            border-radius: 14px;
            color: white;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            background: linear-gradient(135deg, #7c3aed, #c084fc);
            box-shadow: 0 10px 20px rgba(124, 58, 237, 0.25);
        }

        .boton:hover {
            transform: translateY(-2px);
            box-shadow: 0 14px 24px rgba(124, 58, 237, 0.35);
        }

        .boton:active {
            transform: scale(0.98);
        }

        p {
            margin-top: 16px;
            font-size: 14px;
            color: #6b7280;
        }

        .mensaje-error {
            background: #fee2f8;
            color: #9d174d;
            border: 1px solid #fbcfe8;
            border-radius: 12px;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 10px;
            text-align: center;
        }

        @media (max-width: 480px) {
            .tarjeta {
                padding: 28px 22px;
            }

            .titulo {
                font-size: 25px;
            }
        }
    </style>
</head>
<body>
<div class="contenedor">
    <div class="tarjeta">
        <h2 class="titulo">Crear una cuenta</h2>
        <p class="subtitulo">Ingrese sus credenciales para registrarse</p>

        <div th:if="${errorRegistro}" class="mensaje-error" th:text="${errorRegistro}"></div>
        <div th:if="${errores}">
            <div th:each="error:${errores}" class="mensaje-error" th:text="${error.defaultMessage}"></div>
        </div>

        <form th:action="@{/register}" method="post">
            <div class="campo">
                <label for="username">Nombre</label>
                <input type="text" name="username" id="username" placeholder="Ingrese su nombre" required>
            </div>
            <div class="campo">
                <label for="email">Correo</label>
                <input type="email" name="email" id="email" placeholder="Ingrese su correo electrónico" required>
            </div>
            <div class="campo">
                <label for="password">Contraseña</label>
                <input type="password" name="password" id="password" placeholder="Ingrese su contraseña (Debe tener 8 caracteres)" required>
            </div>
            <button type="submit" class="boton">Registrarse</button>
        </form>
        <p>¿Ya tienes una cuenta? <a href="login.html" style="color:#2563eb;">Inicia Sesión</a></p>
    </div>
</div>

</body>
</html>
